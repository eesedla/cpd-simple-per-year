<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPD Hearings Per Year</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto+Condensed:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: transparent;
  font-family: 'Roboto Condensed', 'Arial Narrow', sans-serif;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  min-height: 100vh;
  padding: 32px 16px;
}
.viz-container {
  width: 100%;
  max-width: 900px;
  background: transparent;
  overflow: hidden;
}
.viz-container::before {
  content: '';
  display: block;
  height: 4px;
  background: #F4C913;
  width: 100%;
}

/* Header */
.viz-header { padding: 20px 20px 16px; }
.viz-kicker {
  font-family: 'Inter', sans-serif; font-weight: 600; font-size: 12px;
  color: #404F54; opacity: 0.65; text-transform: uppercase;
  letter-spacing: 0.08em; margin-bottom: 4px;
}
.viz-heading {
  font-size: 22px; font-weight: 700; color: #404F54;
  line-height: 1.3; margin-bottom: 4px;
}
.viz-subheading {
  font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
  color: #404F54; opacity: 0.72; line-height: 1.5;
}

/* Chart */
.chart-area { padding: 18px 14px 6px; position: relative; }
#chart { width: 100%; height: auto; display: block; }
.axis-text {
  font-family: 'Inter', sans-serif; fill: #404F54; font-size: 13px;
}
.ytick { fill: #404F54; opacity: 0.5; font-size: 11px; font-family: 'Inter', sans-serif; }
.gridline { stroke: #404F54; stroke-opacity: 0.12; stroke-width: 1; }
.col-total {
  font-family: 'Roboto Condensed', sans-serif; font-weight: 700;
  fill: #404F54; font-size: 12px;
}


/* Source */
.viz-source {
  padding: 10px 20px 20px;
  font-family: 'Inter', sans-serif; font-size: 11px;
  color: #404F54; opacity: 0.5;
}
</style>
</head>
<body>
<div class="viz-container">
  <div class="viz-header">
    <div class="viz-kicker">Signal Cleveland</div>
    <div class="viz-heading">Disciplinary hearings per year</div>
    <div class="viz-subheading">Number of Cleveland Police Department disciplinary hearings held annually.</div>
  </div>

  <div class="chart-area">
    <svg id="chart"></svg>
  </div>


</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const data = [
  { year: 2017, hearings: 152 },
  { year: 2018, hearings: 197 },
  { year: 2019, hearings: 146 },
  { year: 2020, hearings: 212 },
  { year: 2021, hearings: 217 },
  { year: 2022, hearings: 155 },
  { year: 2023, hearings: 250 },
  { year: 2024, hearings: 128 },
  { year: 2025, hearings: 109 },
];

// ── CONFIG ────────────────────────────────────────────────────────────────────
const BAR_COLOR = '#23685b';
const MARGIN        = { top: 24, right: 16, bottom: 36, left: 64 };
const SVG_HEIGHT    = 320;

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const svg = document.getElementById('chart');
  const W   = svg.parentElement.clientWidth;
  const H        = SVG_HEIGHT;
  const iW       = W - MARGIN.left - MARGIN.right;
  const iH       = H - MARGIN.top  - MARGIN.bottom;

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('width', W);
  svg.setAttribute('setAttribute', H);
  svg.innerHTML = '';

  const ns = 'http://www.w3.org/2000/svg';
  const g  = document.createElementNS(ns, 'g');
  g.setAttribute('transform', `translate(${MARGIN.left},${MARGIN.top})`);
  svg.appendChild(g);

  const nice     = 300;
  const tickStep = 75;
  const xStep    = iW / data.length;
  const barW     = xStep * 0.55;
  const barPad   = (xStep - barW) / 2;

  // Y-axis label
  const yAxisLabel = document.createElementNS(ns, 'text');
  yAxisLabel.setAttribute('transform', `rotate(-90)`);
  yAxisLabel.setAttribute('x', -(iH / 2));
  yAxisLabel.setAttribute('y', -MARGIN.left + 14);
  yAxisLabel.setAttribute('text-anchor', 'middle');
  yAxisLabel.setAttribute('class', 'ytick');
  yAxisLabel.style.opacity = '0.7';
  yAxisLabel.style.fontSize = '12px';
  yAxisLabel.textContent = 'Number of hearings';
  g.appendChild(yAxisLabel);

  // Gridlines + y-ticks
  for (let t = 0; t <= 4; t++) {
    const val = t * tickStep;
    const y   = iH - (val / nice) * iH;

    const line = document.createElementNS(ns, 'line');
    line.setAttribute('x1', 0); line.setAttribute('x2', iW);
    line.setAttribute('y1', y); line.setAttribute('y2', y);
    line.setAttribute('class', 'gridline');
    g.appendChild(line);

    const label = document.createElementNS(ns, 'text');
    label.setAttribute('x', -8);
    label.setAttribute('y', y + 4);
    label.setAttribute('text-anchor', 'end');
    label.setAttribute('class', 'ytick');
    label.textContent = val.toLocaleString();
    g.appendChild(label);
  }

  // Bars + x-labels
  data.forEach((d, i) => {
    const x  = i * xStep + barPad;
    const bH = (d.hearings / nice) * iH;
    const y  = iH - bH;

    const rect = document.createElementNS(ns, 'rect');
    rect.setAttribute('x', x);
    rect.setAttribute('y', y);
    rect.setAttribute('width', barW);
    rect.setAttribute('height', bH);
    rect.setAttribute('fill', BAR_COLOR);
    rect.setAttribute('rx', 1);
    g.appendChild(rect);

    // Count label above bar
    const barLabel = document.createElementNS(ns, 'text');
    barLabel.setAttribute('x', x + barW / 2);
    barLabel.setAttribute('y', y - 5);
    barLabel.setAttribute('text-anchor', 'middle');
    barLabel.setAttribute('class', 'col-total');
    barLabel.textContent = d.hearings;
    g.appendChild(barLabel);

    // X-axis year label
    const xLabel = document.createElementNS(ns, 'text');
    xLabel.setAttribute('x', x + barW / 2);
    xLabel.setAttribute('y', iH + 22);
    xLabel.setAttribute('text-anchor', 'middle');
    xLabel.setAttribute('class', 'axis-text');
    xLabel.textContent = d.year;
    g.appendChild(xLabel);
  });
}

render();
window.addEventListener('resize', render);
</script>
</body>
</html>
