<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPD Hearings Per Year</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: transparent;
  font-family: 'Roboto Condensed', 'Arial Narrow', sans-serif;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 32px 16px;
}
.viz-container {
  width: 100%;
  max-width: 900px;
  background: transparent;
  overflow: hidden;
}
.viz-container::before {
  content: '';
  display: block;
  height: 4px;
  background: #F4C913;
  width: 100%;
}

/* Header */
.viz-header { padding: 20px 20px 16px; }
.viz-kicker {
  font-family: 'Gotham', 'Gotham Medium', sans-serif;
  font-weight: 500;
  font-size: 12px;
  color: #404F54;
  opacity: 0.65;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}
.viz-heading {
  font-family: 'Roboto Condensed', 'Arial Narrow', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: #404F54;
  line-height: 1.3;
  margin-bottom: 4px;
}
.viz-subheading {
  font-family: 'Inter', Arial, sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: #404F54;
  opacity: 0.72;
  line-height: 1.5;
}

/* Chart */
.chart-area { padding: 18px 14px 6px; position: relative; }
#chart { width: 100%; height: auto; display: block; }
.axis-text {
  font-family: 'Inter', sans-serif; fill: #404F54; font-size: 12px;
}
.ytick { fill: #404F54; opacity: 0.5; font-size: 11px; font-family: 'Inter', sans-serif; }
.gridline { stroke: #404F54; stroke-opacity: 0.12; stroke-width: 1; }
.col-total {
  font-family: 'Inter', sans-serif; font-weight: 700;
  fill: #404F54; font-size: 12px;
  opacity: 0;
}


/* Source */
.viz-source {
  padding: 10px 20px 20px;
  font-family: 'Inter', sans-serif; font-size: 11px;
  color: #404F54; opacity: 0.5;
}
</style>
</head>
<body>
<div class="viz-container">
  <div class="viz-header">
    <div class="viz-kicker">Signal Cleveland</div>
    <div class="viz-heading">Disciplinary cases per year, 2017-2025</div>
    <div class="viz-subheading">This chart shows how many disciplinary hearings the department held for Cleveland officers per year. Some officers had more than one hearing.</div>
  </div>

  <div class="chart-area">
    <svg id="chart"></svg>
  </div>


</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const data = [
  { year: 2017, hearings: 165 },
  { year: 2018, hearings: 213 },
  { year: 2019, hearings: 174 },
  { year: 2020, hearings: 238 },
  { year: 2021, hearings: 257 },
  { year: 2022, hearings: 184 },
  { year: 2023, hearings: 258 },
  { year: 2024, hearings: 138 },
  { year: 2025, hearings: 116 },
];

// ── CONFIG ────────────────────────────────────────────────────────────────────
const BAR_COLOR = '#23685b';
const MARGIN        = { top: 24, right: 16, bottom: 36, left: 24 };
const SVG_HEIGHT    = 320;

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const svg = document.getElementById('chart');
  const W   = svg.parentElement.clientWidth;
  const H        = SVG_HEIGHT;
  const iW       = W - MARGIN.left - MARGIN.right;
  const iH       = H - MARGIN.top  - MARGIN.bottom;

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.innerHTML = '';

  const ns = 'http://www.w3.org/2000/svg';
  const g  = document.createElementNS(ns, 'g');
  g.setAttribute('transform', `translate(${MARGIN.left},${MARGIN.top})`);
  svg.appendChild(g);

  const nice     = 300;
  const tickStep = 50;
  const xStep    = iW / data.length;
  const barW     = xStep * 0.55;
  const barPad   = (xStep - barW) / 2;

  // Y-axis label
  const yAxisLabel = document.createElementNS(ns, 'text');
  yAxisLabel.setAttribute('transform', `rotate(-90)`);
  yAxisLabel.setAttribute('x', -(iH / 2));
  yAxisLabel.setAttribute('y', -MARGIN.left + 14);
  yAxisLabel.setAttribute('text-anchor', 'middle');
  yAxisLabel.setAttribute('class', 'ytick');
  yAxisLabel.style.opacity = '0.7';
  yAxisLabel.style.fontSize = '12px';
  yAxisLabel.textContent = 'Number of hearings';
  g.appendChild(yAxisLabel);

  // Gridlines + y-ticks
  for (let t = 0; t <= 6; t++) {
    const val = t * tickStep;
    const y   = iH - (val / nice) * iH;

    const line = document.createElementNS(ns, 'line');
    line.setAttribute('x1', 0); line.setAttribute('x2', iW);
    line.setAttribute('y1', y); line.setAttribute('y2', y);
    line.setAttribute('class', 'gridline');
    g.appendChild(line);
  }

  // Bars + x-labels
  data.forEach((d, i) => {
    const x  = i * xStep + barPad;
    const bH = (d.hearings / nice) * iH;
    const y  = iH - bH;

    const rect = document.createElementNS(ns, 'rect');
    rect.setAttribute('x', x);
    rect.setAttribute('y', y);
    rect.setAttribute('width', barW);
    rect.setAttribute('height', bH);
    rect.setAttribute('fill', BAR_COLOR);
    rect.setAttribute('rx', 1);
    rect.setAttribute('class', 'seg');
    g.appendChild(rect);

    // Count label above bar
    const barLabel = document.createElementNS(ns, 'text');
    barLabel.setAttribute('x', x + barW / 2);
    barLabel.setAttribute('y', y - 5);
    barLabel.setAttribute('text-anchor', 'middle');
    barLabel.setAttribute('class', 'col-total');
    barLabel.textContent = d.hearings;
    g.appendChild(barLabel);

    // X-axis year label
    const xLabel = document.createElementNS(ns, 'text');
    xLabel.setAttribute('x', x + barW / 2);
    xLabel.setAttribute('y', iH + 22);
    xLabel.setAttribute('text-anchor', 'middle');
    xLabel.setAttribute('class', 'axis-text');
    xLabel.textContent = d.year;
    g.appendChild(xLabel);
  });

  return { svg, g, iW, iH };
}

// ── BAR-REVEAL ANIMATION ───────────────────────────────────────────────────────
function setupClip(svg, g, iW, iH) {
  const ns = 'http://www.w3.org/2000/svg';
  const defs = document.createElementNS(ns, 'defs');
  svg.appendChild(defs);

  const clipPath = document.createElementNS(ns, 'clipPath');
  clipPath.setAttribute('id', 'bars-reveal');
  defs.appendChild(clipPath);

  const clipRect = document.createElementNS(ns, 'rect');
  clipRect.setAttribute('x', 0);
  clipRect.setAttribute('y', iH);
  clipRect.setAttribute('width', iW);
  clipRect.setAttribute('height', 0);
  clipPath.appendChild(clipRect);

  g.querySelectorAll('.seg').forEach(r => r.setAttribute('clip-path', 'url(#bars-reveal)'));
  return clipRect;
}

function animateClip(clipRect, iH) {
  const duration = 1600;
  const start = performance.now();
  const ease = t => {
    const c1 = 1.4, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  };
  function frame(now) {
    const t = Math.min((now - start) / duration, 1);
    const h = iH * ease(t);
    clipRect.setAttribute('y', iH - h);
    clipRect.setAttribute('height', h);

    const fadeStart = 0.5, fadeEnd = 0.85;
    const labelOpacity = Math.min(Math.max((t - fadeStart) / (fadeEnd - fadeStart), 0), 1);
    document.querySelectorAll('.col-total').forEach(l => l.style.opacity = labelOpacity);

    if (t < 1) {
      requestAnimationFrame(frame);
    }
  }
  requestAnimationFrame(frame);
}

let chartAnimated = false;
let current;

function draw() {
  const { svg, g, iW, iH } = render();
  const clipRect = setupClip(svg, g, iW, iH);

  if (chartAnimated) {
    clipRect.setAttribute('y', 0);
    clipRect.setAttribute('height', iH);
    svg.querySelectorAll('.col-total').forEach(l => l.style.opacity = '1');
  }

  current = { clipRect, iH };
}

draw();
window.addEventListener('resize', draw);

const observer = new IntersectionObserver(entries => {
  if (entries[0].isIntersecting && !chartAnimated) {
    chartAnimated = true;
    animateClip(current.clipRect, current.iH);
  }
}, { threshold: 0 });
observer.observe(document.querySelector('.chart-area'));
</script>
<script>
/* Auto-height embed messaging (self-contained replacement for pym.js — NPR CDN retired) */
(function () {
  function postHeight() {
    var el = document.querySelector('.viz-container');
    var h = el ? Math.ceil(el.getBoundingClientRect().bottom + 32) : document.body.scrollHeight;
    window.parent.postMessage({ type: 'embed-height', height: h }, '*');
  }
  window.addEventListener('load', postHeight);
  window.addEventListener('resize', postHeight);
  setInterval(postHeight, 500);
})();
</script>
</body>
</html>
